provider:
  type: "anthropic"
  api_key: "${MINICLAW_ANTHROPIC_API_KEY}"
  base_url: "${MINICLAW_ANTHROPIC_BASE_URL}"
  model: "claude-opus-4-6"
  temperature: 0.7
  context_window: 200000
  quota_factor: 3
  pricing:
    read: 5
    write: 25
    cache_read: 0.5
    cache_write: 6.25
  delay: 5.0

channel:
  type: "cli"
  app_id: "${FEISHU_APP_ID}"
  app_secret: "${FEISHU_APP_SECRET}"

agent:
  system_prompt: >
    You are a helpful assistant with access to tools.
    Use tools when needed to answer questions and complete tasks.
  max_tool_iterations: 50
  workspace_dir: ".workspace"

remotes:
  autodl4090:
    ssh_host: "connect.nmb1.seetacloud.com"
    ssh_user: "yekai"
    ssh_port: 14465
    daemon_port: 9100
    local_port: 0 # auto-assigned
  vcl:
    ssh_host: "162.105.92.9"
    ssh_user: "vcl"
    ssh_port: 22
    daemon_port: 6789
    local_port: 0 # auto-assigned
  wz20:
    ssh_host: "222.29.51.20"
    ssh_user: "yekai"
    ssh_port: 22
    daemon_port: 9100
    local_port: 0 # auto-assigned

logging:
  file_level: "debug"
  console_level: "info"

statusline:
  command: "python3 .workspace/statusline.py"
  timeout: 5.0

plugctx:
  auto_load:
    - "general"
